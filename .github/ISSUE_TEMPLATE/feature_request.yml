name: Feature Request
description: Suggest a new feature or improvement for openapi-normalizer
labels: ['enhancement']
assignees: ['The-Lone-Druid']
body:
  - type: markdown
    attributes:
      value: |
        Have an idea? We'd love to hear it! Please describe your feature request as clearly as possible.
        Check existing issues first to avoid duplicates.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? What's the motivation?
      placeholder: 'I often find that after running normalize(), the output still contains...'
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature you'd like to see. Include API shape if relevant.
      placeholder: |
        Add a `stripXFields` option to `normalize()` that removes all keys prefixed
        with `x-` except for `x-postman-variable`.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Are there workarounds you've tried? Why are they insufficient?

  - type: dropdown
    id: scope
    attributes:
      label: Which area does this affect?
      options:
        - normalize() API
        - convertCollection() API
        - CLI
        - TypeScript types
        - Documentation
        - Build / tooling
        - Other
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I am willing to submit a pull request for this feature.
