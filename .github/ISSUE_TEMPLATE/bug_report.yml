name: Bug Report
description: Report a bug or unexpected behavior in openapi-normalizer
labels: ['bug', 'needs-triage']
assignees: ['The-Lone-Druid']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below as completely as possible.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: 'When I call `normalize()` with a Postman-exported spec, it throws...'
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Import `normalize` from `openapi-normalizer`
        2. Pass the following input: ...
        3. Observe the error / unexpected output
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error messages and stack traces if applicable.
    validations:
      required: true

  - type: textarea
    id: input
    attributes:
      label: Minimal Input (JSON)
      description: Paste a minimal OpenAPI document or Postman Collection that reproduces the issue.
      render: json

  - type: dropdown
    id: api
    attributes:
      label: Which API?
      options:
        - normalize()
        - convertCollection()
        - CLI — normalize command
        - CLI — convert command
        - Other / both
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Package Version
      placeholder: 'e.g. 1.0.1'
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js Version
      placeholder: 'e.g. 22.0.0'
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Anything else that might be relevant (OS, bundler, usage environment).
