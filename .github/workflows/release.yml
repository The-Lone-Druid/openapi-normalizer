name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Verify npm token
        run: |
          npm whoami --registry https://registry.npmjs.org || echo "::error::NPM_TOKEN is invalid or does not have publish access"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Configure npm auth for pnpm
        run: |
          if [ -n "$NPM_TOKEN" ]; then
            echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> $HOME/.npmrc
          fi
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Resolve publish command
        id: publish-cmd
        run: |
          if [ -n "$NPM_TOKEN" ]; then
            echo "cmd=pnpm release" >> $GITHUB_OUTPUT
          else
            echo "cmd=" >> $GITHUB_OUTPUT
            echo "::warning::NPM_TOKEN secret is not set — skipping publish. Add it in repo Settings → Secrets → Actions."
          fi
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: ${{ steps.publish-cmd.outputs.cmd }}
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Print npm debug log on failure
        if: failure()
        run: |
          echo "=== npm debug log ==="
          find /home/runner/.npm/_logs -name "*.log" -exec cat {} \; 2>/dev/null || echo "no log found"
