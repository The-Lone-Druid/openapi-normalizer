version: 2
updates:
  # Keep npm devDependencies up to date
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: 'chore(deps)'
    groups:
      typescript-eslint:
        patterns:
          - 'typescript-eslint'
          - '@typescript-eslint/*'
      commitlint:
        patterns:
          - '@commitlint/*'
      vitest:
        patterns:
          - 'vitest'
          - '@vitest/*'
      changesets:
        patterns:
          - '@changesets/*'

  # Keep GitHub Actions up to date
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: UTC
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: 'chore(ci)'
